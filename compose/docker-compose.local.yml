# Local-development overlay. Layer this on top of docker-compose.yml when
# running on your laptop:
#
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Differences vs the VPS path:
#   - Exposes the brain service (8100) on 127.0.0.1 so the host-run PWA
#     backend and ad-hoc curl/python tests can reach it.
#   - Exposes Postgres (5432) on 127.0.0.1 so you can inspect the substrate
#     with psql / any client: psql postgresql://brain:<pw>@127.0.0.1:5432/brain
#   - No Caddy / TLS / bearer. The bearer header is enforced by Caddy on
#     the VPS; locally you talk to the brain directly over plain HTTP.
#   - The pwa service is intentionally excluded here. Locally you run
#     the PWA host-native (`cd pwa && npm run dev`) for HMR speed — the
#     Dockerfile is for the VPS path only. The compose override below
#     disables the pwa service for local use; otherwise `docker compose
#     up` would try to build the image even though you don't want it.
#
# Do NOT layer this on the VPS — exposing the brain to the host firewall
# there defeats the "only Caddy is public" posture.

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  # Expose the brain service on the host so the host-run PWA backend (and
  # ad-hoc curl/python tests) can reach it during local dev.
  brain:
    ports:
      - "127.0.0.1:8100:8100"

  # Disable the pwa service locally — `profiles: [vps-only]` keeps it
  # out of the default `docker compose up` set. Run the PWA on the host
  # with `cd pwa && npm run dev` instead.
  pwa:
    profiles: ["vps-only"]

  # Same treatment for scout: its image is the VPS path. Locally you run
  # scout host-native (`cd ~/Repositories/scout && go build && ./scout serve`),
  # so `profiles: [vps-only]` keeps `docker compose up` from building it here.
  scout:
    profiles: ["vps-only"]

  # Caddy is the VPS edge (TLS + SSO in front of the apps). Locally there's no
  # TLS and you talk to the brain directly, so keep it out of `docker compose
  # up` with the same vps-only profile.
  caddy:
    profiles: ["vps-only"]

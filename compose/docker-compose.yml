services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    restart: unless-stopped
    networks:
      - brainnet
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 2g

  graphiti:
    image: zepai/graphiti-mcp:latest
    container_name: graphiti
    restart: unless-stopped
    networks:
      - brainnet
    environment:
      # FalkorDB connection
      FALKORDB_URI: falkor://falkordb:6379
      # LLM (Anthropic by default). Switch providers in graphiti-config.yaml.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Embedder (Voyage by default; same parent as Anthropic, free tier)
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      # Optional swaps — populate if your config.yaml points at them
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_URL: ${OPENAI_API_URL:-}
      # Namespacing: single global group; see design-history.md
      GRAPHITI_GROUP_ID: ${GRAPHITI_GROUP_ID:-brain}
    volumes:
      - ./graphiti-config.yaml:/app/config/config.yaml:ro
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  brainnet:
    driver: bridge

volumes:
  falkordb-data:

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    restart: unless-stopped
    networks:
      - brainnet
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 2g

networks:
  brainnet:
    driver: bridge

volumes:
  falkordb-data:

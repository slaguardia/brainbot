services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    restart: unless-stopped
    networks:
      - brainnet
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 2g

  graphiti:
    image: zepai/graphiti-mcp:latest
    container_name: graphiti
    restart: unless-stopped
    networks:
      - brainnet
    environment:
      FALKORDB_URI: falkor://falkordb:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MODEL_NAME: ${GRAPHITI_MODEL_NAME:-claude-haiku-4-5}
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  brainnet:
    driver: bridge

volumes:
  falkordb-data:

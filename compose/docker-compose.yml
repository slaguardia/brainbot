services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    restart: unless-stopped
    networks:
      - brainnet
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 2g

  graphiti:
    image: zepai/graphiti-mcp:latest
    container_name: graphiti
    restart: unless-stopped
    networks:
      - brainnet
    environment:
      FALKORDB_URI: falkor://falkordb:6379
      # Provider-neutral via OpenAI-compatible API. Defaults to OpenRouter
      # so you can pick any model with one signup; swap OPENAI_BASE_URL +
      # OPENAI_API_KEY + MODEL_NAME to use OpenAI direct, Together, Groq,
      # local Ollama, vLLM, or anything else that speaks the OpenAI shape.
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      MODEL_NAME: ${GRAPHITI_MODEL_NAME:-anthropic/claude-haiku-4.5}
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  brainnet:
    driver: bridge

volumes:
  falkordb-data:

# mprocs config for local brainbot development.
#   $ mprocs
#
# Brings up the local stack the way docs/quickstart.md describes:
#   - "stack": postgres (pgvector) + brain via the local compose overlay
#     (brain on 127.0.0.1:8100, no dashboard/scout/caddy containers).
#   - "dashboard": the dashboard host-native for HMR (client + server via concurrently).
#
# The dashboard server expects the brain at http://localhost:8100, which "stack"
# provides. Requires compose/.env (see compose/.env.example).
procs:
  stack:
    shell: docker compose -f docker-compose.yml -f docker-compose.local.yml up
    cwd: compose

  dashboard:
    shell: npm run dev
    cwd: dashboard

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Brain" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Brain</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="capture-view">
      <header class="cap-head">
        <span class="brand" aria-label="brain">brain</span>
        <a id="open-docs" href="#docs" aria-label="How the brain works">docs</a>
      </header>
      <textarea
        id="capture"
        placeholder="Thought, note, anything…"
        autocomplete="off"
        autocorrect="on"
        spellcheck="true"
      ></textarea>
      <button id="send" type="button" disabled>Capture disabled</button>
      <p id="capture-note" class="cap-note">
        Free-text capture is paused. The brain now ingests <strong>sources</strong>
        (Notion pages / docs) rather than raw text — a source-editing surface is
        coming. See <a href="#docs">docs</a> for how the brain works today.
      </p>
    </main>
    <div id="docs-view" hidden></div>
    <div id="learnings-view" hidden></div>
    <div id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
